name: Deploy Laravel + React to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer Dependencies
        # --no-scripts stops package compilation on the runner so it doesn't crash on syntax differences
        run: composer install --no-dev --optimize-autoloader --no-plugins --no-scripts --ignore-platform-reqs

      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      - name: Build React Assets
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./ 
          dangerous-clean-slate: false