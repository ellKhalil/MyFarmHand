name: Deploy Laravel + React to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-plugins --no-scripts --ignore-platform-reqs

      - name: Install NPM Dependencies
        run: npm install --legacy-peer-deps

      - name: Build React Assets
        run: npm run build

      - name: Deploy to cPanel Subdomain
        uses: Aki77/ftp-deploy-action@v1
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          # Explicitly target everything built in the local runner path
          local-dir: ./
          # Use empty rule since the cPanel user is jailed to the target folder
          remote-dir: ./
